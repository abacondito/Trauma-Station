- type: entity
  abstract: true
  parent: BaseAreaStation
  id: BaseAreaService
  name: service
  components:
  - type: DepartmentArea
    department: Service

# For the kitchen itself
- type: entity
  parent: BaseAreaService
  id: AreaKitchen
  name: kitchen
  description: Allows the Chef to use CQC inside of here.
  components:
  - type: Sprite
    state: kitchen
  - type: MartialArtArea
    form: CloseQuartersCombat

# For the seating area between kitchen and bar
- type: entity
  parent: AreaKitchen
  id: AreaCafeteria
  name: cafeteria
  components:
  - type: Sprite
    state: cafeteria

# For the kitchen freezer room
- type: entity
  parent: AreaKitchen
  id: AreaColdRoom
  name: cold room
  components:
  - type: Sprite
    state: kitchen_cold
