# Base component for edible food-like items
#
- type: entity
  abstract: true
  parent: BaseItem
  id: EdibleBase
  components:
  - type: FlavorProfile
    flavors:
      - food
  - type: Edible
  - type: Sprite
  - type: StaticPrice
    price: 0

#
# Base component for consumable food
# that should be cleaned up in space
#
- type: entity
  abstract: true
  parent: EdibleBase
  id: FoodBase
  components:
  - type: SpaceGarbage
# <Trauma>
  - type: Perishable
    rotAfter: 600
    molsPerSecondPerUnitMass: 0
  - type: RotInto
    entity: FoodRot
    stage: 1
  - type: Temperature
    currentTemperature: 290
    specificHeat: 25
  - type: TemperatureDamage
  - type: InternalTemperature
    thickness: 0.02
    area: 0.02
    conductivity: 15
  - type: BurnableFood
    burnTemp: 550
#</Trauma>

# This base type is used to cover all of the "obvious" things that should be doable to open-package food.
# Practically this means injection.
# But it might in future also mean drawing with a syringe, so this is a base prototype just in case.

- type: entity
  abstract: true
  parent: FoodBase
  id: FoodInjectableBase
  components:
  - type: InjectableSolution
    solution: food
  - type: RefillableSolution
    solution: food

# usable by any food that can be opened
# handles appearance with states "icon" and "icon-open"
- type: entity
  abstract: true
  id: FoodOpenableBase
  components:
  - type: Appearance
  - type: Sprite
    layers:
    - state: icon
      map: ["icon"]
  - type: GenericVisualizer
    visuals:
      enum.OpenableVisuals.Opened:
        icon:
          True: {state: "icon-open"}
          False: {state: "icon"}
  - type: Openable
